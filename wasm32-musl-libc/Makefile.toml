[config]
default_to_workspace = false

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[tasks.bindgen]
description = "Generate Rust bindings from C headers"
command = "cargo"
args = ["build", "--no-default-features", "--features", "bindgen"]

[tasks.build]
description = "Compile musl libc.a from source"
command = "cargo"
args = ["build", "--no-default-features","--target", "wasm32-unknown-unknown", "--features", "build-libc"]

[tasks.build-all]
description = "Build both bindings and libc.a"
dependencies = ["bindgen", "build"]

[tasks.link]
description = "Link with the pre-compiled libwasm32_musl_libc.a"
command = "cargo"
args = ["build", "--target", "wasm32-unknown-unknown", "--features", "link-libc"]

[tasks.clean]
description = "Clean generated files and rebuild"
script = '''
rm -rf src/generated_headers/
rm -rf target/
rm -f lib/*.a
'''

[tasks.dist]
description = "Build distribution package with pre-compiled library"
dependencies = ["clean", "build-libc"]