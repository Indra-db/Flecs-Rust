[package]
name = "wasi_libc_bindgen"
version = "0.1.0"
edition = "2021"
description = "Rust FFI bindings for wasi-libc generated via bindgen"
license = "MIT OR Apache-2.0"
include = ["src/**/*", "lib/**/*", "build.rs", "Cargo.toml", "README.md"]

[dependencies]

[build-dependencies]
bindgen = "0.72"
cc = "1.0"

[features]
default = []
# Regenerate the C bindings for wasi-libc
bindgen = []
# Build libc.a from the libc-top-half sources
build-libc = []
# Link with the pre-compiled libc.a (for end users)
link-libc = []
