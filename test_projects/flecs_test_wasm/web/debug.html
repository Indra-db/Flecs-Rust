<!DOCTYPE html>
<html>
<head>
    <title>Flecs WASM Debugger</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffe0e0; color: red; }
        .success { background: #e0ffe0; color: green; }
        button { padding: 10px; margin: 5px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Flecs WASM Debugger</h1>
    <p>Open browser DevTools (F12) for detailed debugging</p>
    
    <button onclick="runTest('test_progress')">Test test_progress()</button>
    <button onclick="runTest('test_progress')">Test test_progress()</button>
    <button onclick="runTest('test_minimal_progress')">Test test_minimal_progress()</button>
    <button onclick="runTest('debug_step_by_step')">Debug Step by Step</button>
    <button onclick="clearLogs()">Clear Logs</button>
    
    <div id="logs"></div>

    <script>
        let wasmModule = null;
        
        function log(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            document.getElementById('logs').appendChild(div);
            console.log(`[${type.toUpperCase()}]`, message);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        // Console functions that WASM can call
        window.console_log = function(ptr, len) {
            const view = new Uint8Array(wasmModule.instance.exports.memory.buffer, ptr, len);
            const str = new TextDecoder().decode(view);
            log(`[WASM] ${str}`, 'log');
        };
        
        window.console_error = function(ptr, len) {
            const view = new Uint8Array(wasmModule.instance.exports.memory.buffer, ptr, len);
            const str = new TextDecoder().decode(view);
            log(`[WASM ERROR] ${str}`, 'error');
        };
        
        window.debug_trace = function(value) {
            log(`[WASM TRACE] ${value}`, 'log');
        };
        
        async function loadWasm() {
            try {
                log('Loading WASM module...');
                
                const response = await fetch('../../target/wasm32-unknown-unknown/debug/flecs_test_wasm.wasm');
                const wasmBuffer = await response.arrayBuffer();
                
                const imports = {
                    env: {
                        backtrace: () => 0,
                        backtrace_symbols: () => 0,
                        console_log: window.console_log,
                        console_error: window.console_error,
                        debug_trace: window.debug_trace,
                    },
                    wasi_snapshot_preview1: {
                        environ_get: () => 0,
                        environ_sizes_get: () => 0,
                        fd_close: () => 0,
                        fd_fdstat_get: () => 0,
                        fd_prestat_get: () => 0,
                        fd_prestat_dir_name: () => 0,
                        fd_read: () => 0,
                        fd_seek: () => 0,
                        fd_write: () => 0,
                        proc_exit: (code) => {
                            log(`Process exit with code: ${code}`, 'error');
                            return 0;
                        },
                        random_get: () => 0,
                    }
                };
                
                wasmModule = await WebAssembly.instantiate(wasmBuffer, imports);
                log('WASM module loaded successfully!', 'success');
                log(`Available exports: ${Object.keys(wasmModule.instance.exports).join(', ')}`);
                
            } catch (error) {
                log(`Failed to load WASM: ${error}`, 'error');
                console.error('WASM load error:', error);
            }
        }
        
        function runTest(functionName) {
            if (!wasmModule) {
                log('WASM module not loaded yet', 'error');
                return;
            }
            
            log(`\n--- Testing ${functionName}() ---`);
            
            try {
                // Add debugger breakpoint here - you can set breakpoints in DevTools
                debugger;
                
                const result = wasmModule.instance.exports[functionName]();
                log(`${functionName}() returned: ${result}`, 'success');
                
            } catch (error) {
                log(`Error calling ${functionName}(): ${error}`, 'error');
                log(`Error name: ${error.name}`, 'error');
                log(`Error message: ${error.message}`, 'error');
                
                if (error.stack) {
                    log(`Error stack: ${error.stack}`, 'error');
                }
                
                // Log additional WASM error details
                if (error instanceof WebAssembly.RuntimeError) {
                    log('This is a WebAssembly RuntimeError', 'error');
                }
                
                console.error('Full error object:', error);
            }
        }
        
        // Load WASM when page loads
        window.addEventListener('load', loadWasm);
    </script>
</body>
</html>
