[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

# Build flecs_ecs with wasm feature set, then this crate for wasm target
[tasks.build-wasm]
description = "Build flecs_test_wasm for wasm32-unknown-unknown"
script = [
  'cargo build -p flecs_test_wasm --no-default-features --features "flecs_base,wasm32"',
  'cargo build -p flecs_test_wasm --target wasm32-unknown-unknown --no-default-features --features "flecs_base,flecs_use_os_alloc"',
]
workspace = false 

[tasks.run-wasm]
description = "Run the built wasm module via Node script"
dependencies = ["build-wasm"]
command = "node"
args = ["./web/run.js"]
workspace = false

# Two-stage wasm-bindgen build process
[tasks.build-bindgen]
description = "Build with wasm-bindgen using two-stage approach (no WASI conflicts)"
script = [
  'echo "🦀 Two-stage WASM-bindgen build process"',
  'echo "This solves wasm-bindgen + wasi-libc incompatibility"',
  'echo ""',
  'echo "Stage 1: Generate JS bindings from minimal WASM (no WASI)..."',
  '(cd bindgen_minimal && cargo build --target wasm32-unknown-unknown --release)',
  '(cd bindgen_minimal && wasm-bindgen --target web --no-typescript --out-dir ../pkg target/wasm32-unknown-unknown/release/flecs_bindgen_minimal.wasm)',
  'echo "✅ Generated JS bindings successfully"',
  'echo ""',
  'echo "Stage 2: Build full Flecs runtime WASM (with WASI)..."',
  'cargo build --no-default-features --features "flecs_base,wasm32"',
  'cargo build --target wasm32-unknown-unknown --no-default-features --features "flecs_base,flecs_use_os_alloc"',
  'echo "✅ Built full runtime with WASI support"',
  'echo ""',
  'echo "Stage 3: Replace WASM file with runtime version..."',
  'cp ../../target/wasm32-unknown-unknown/debug/flecs_test_wasm.wasm ./pkg/flecs_bindgen_minimal_bg.wasm',
  'echo "✅ Two-stage build complete!"',
  'echo ""',
  'echo "Result: JS bindings (no WASI) + Runtime WASM (full WASI)"',
]
workspace = false

[tasks.test-bindgen]
description = "Verify the two-stage wasm-bindgen build"
dependencies = ["build-bindgen"]
script = [
  'echo "🧪 Testing two-stage wasm-bindgen build..."',
  'echo ""',
  'echo "Checking generated files:"',
  'ls -la pkg/flecs_bindgen_minimal.js pkg/flecs_bindgen_minimal_bg.wasm',
  'echo ""',
  'echo "Verifying JS bindings file size (should be small):"',
  'wc -c pkg/flecs_bindgen_minimal.js',
  'echo ""',
  'echo "Verifying runtime WASM file size (should be large with Flecs):"',
  'wc -c pkg/flecs_bindgen_minimal_bg.wasm',
  'echo ""',
  'echo "Checking for WASI functions in runtime WASM:"',
  'WASI_COUNT=$(wasm2wat pkg/flecs_bindgen_minimal_bg.wasm | grep -c wasilibc || echo "0")',
  'echo "Found $WASI_COUNT WASI functions"',
  'if [ "$WASI_COUNT" -gt "0" ]; then echo "✅ Runtime WASM has WASI support"; else echo "❌ No WASI functions found"; fi',
  'echo ""',
  'echo "Checking that JS bindings contain expected exports:"',
  'if grep -q "run_flecs_bindgen_test" pkg/flecs_bindgen_minimal.js; then echo "✅ Found run_flecs_bindgen_test export"; else echo "❌ Missing run_flecs_bindgen_test export"; fi',
  'if grep -q "add" pkg/flecs_bindgen_minimal.js; then echo "✅ Found add export"; else echo "❌ Missing add export"; fi',
  'if grep -q "greet" pkg/flecs_bindgen_minimal.js; then echo "✅ Found greet export"; else echo "❌ Missing greet export"; fi',
  'echo ""',
  'echo "✅ Two-stage build verification complete"',
]
workspace = false

[tasks.serve-bindgen]
description = "Build and serve the wasm-bindgen demo in browser"
dependencies = ["build-bindgen"]
script = [
  'echo "🦀 Flecs ECS WASM-Bindgen Demo"',
  'echo ""',
  'echo "✅ JS bindings generated from minimal WASM (no WASI conflicts)"',
  'echo "✅ Runtime uses full Flecs implementation (with WASI support)"',
  'echo "✅ Two-stage build resolves wasm-bindgen + wasi-libc incompatibility"',
  'echo ""',
  'echo "🌐 Opening browser to http://localhost:8000/web/bindgen_test.html"',
  'echo "   Test the add() and greet() functions"',  
  'echo "   Test the run_flecs_bindgen_test() function with full Flecs ECS"',
  'echo ""',
  'echo "Press Ctrl+C to stop server"',
  'python3 -m http.server 8000'
]
workspace = false

[tasks.demo-bindgen]
description = "Complete demo of the two-stage wasm-bindgen approach"
script = [
  'echo "🦀 Flecs WASM-Bindgen Demo - Two-Stage Build Approach"',
  'echo "================================================="',
  'echo ""',
  'echo "This demonstrates how to use wasm-bindgen with wasi-libc"',
  'echo "by solving the fundamental incompatibility between them."',
  'echo ""',
  'echo "Problem: wasm-bindgen cannot interpret WASI functions"',
  'echo "Solution: Generate bindings from clean WASM, use full WASM at runtime"',
  'echo ""',
  'echo "Running build process..."',
  'cargo make build-bindgen',
  'echo ""',
  'echo "Running verification..."', 
  'cargo make test-bindgen',
  'echo ""',
  'echo "📖 See WASM_BINDGEN_GUIDE.md for complete documentation"',
  'echo "🌐 Run cargo make serve-bindgen to test in browser"',
]
workspace = false

[tasks.serve-web]
description = "Build WASM and serve the web demo on localhost"
dependencies = ["build-wasm"]
script = [
  'echo "🦀 Flecs ECS WASM Demo"',
  'echo "Building and serving web demo..."',
  'cp ../../target/wasm32-unknown-unknown/debug/flecs_test_wasm.wasm web/',
  'echo "✅ WASM file copied to web/ directory"',
  'echo "🌐 Open http://localhost:8000/web/ in your browser"',
  'python3 -m http.server 8000'
]
workspace = false