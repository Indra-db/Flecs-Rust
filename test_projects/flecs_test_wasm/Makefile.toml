[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = false

[tasks.build-wasm]
description = "Build flecs_test_wasm with wasm-bindgen bindings"
script = [
  'cargo build -p flecs_test_wasm --no-default-features --features "flecs_base,wasm32,flecs_meta"',
  'cargo build -p flecs_test_wasm --target wasm32-unknown-unknown --no-default-features --features "flecs_base,flecs_meta"',
  'wasm-bindgen ../../target/wasm32-unknown-unknown/debug/flecs_test_wasm.wasm --out-dir web/pkg --target web --no-typescript'
]
workspace = false

[tasks.serve]
description = "Build with wasm-bindgen and serve the clean demo"
dependencies = ["build-wasm"]
script = [
  'echo "🦀 Flecs ECS + WASM Demo"',
  'echo "✅ Built with wasm-bindgen"',
  'echo "🌐 Open http://localhost:8000/web/demo.html in your browser"',
  'echo " Starting server..."',
  'python3 -m http.server 8000'
]
workspace = false